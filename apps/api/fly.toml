app = "purechess-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"
  dockerignore_file = ".dockerignore"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  ENGINE_BACKEND = "native"
  NAPI_PREBUILT_BINARY_HOST_MIRROR = "https://npmmirror.com/mirrors/napi-rs"
  WEB_URL = "https://purechess.com"
  NEXT_PUBLIC_APP_URL = "https://purechess.com"
  NEXT_PUBLIC_API_URL = "https://purechess-api.fly.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = "node node_modules/prisma/build/index.js migrate deploy"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    port = 4000
    timeout = "5s"
    type = "http"
