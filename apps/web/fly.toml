app = "purechess-web"
primary_region = "iad"

[build]
  dockerfile = "apps/web/Dockerfile"
  dockerignore_file = ".dockerignore"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://purechess-api.fly.dev"
    NEXT_PUBLIC_SITE_URL = "https://purechess.com"
    NEXT_PUBLIC_POSTHOG_KEY = ""
    NEXT_PUBLIC_POSTHOG_HOST = "https://eu.posthog.com"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"
