app = "purechess-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    # Empty = browser uses the same-origin /api proxy (no CORS preflight);
    # API_PROXY_URL is the rewrite target baked into the build.
    NEXT_PUBLIC_API_URL = ""
    # Fly 6PN private network — no TLS, no edge hop, ~1ms in-region.
    API_PROXY_URL = "http://purechess-api.internal:4000"
    NEXT_PUBLIC_SITE_URL = "https://purechess-web.fly.dev"
    # WS cannot ride the /api same-origin rewrite (rewrites don't upgrade); the
    # browser talks to the API origin directly. Bake it explicitly so WS_URL does
    # not depend on the NODE_ENV fallback branch in use-game-socket.ts.
    NEXT_PUBLIC_WS_URL = "https://purechess-api.fly.dev"
    NEXT_PUBLIC_POSTHOG_KEY = ""
    NEXT_PUBLIC_POSTHOG_HOST = "https://eu.posthog.com"

[env]
  NODE_ENV = "production"
  # Server-side (SSR) fetches go straight to the API at runtime.
  API_INTERNAL_URL = "http://purechess-api.internal:4000"
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"
