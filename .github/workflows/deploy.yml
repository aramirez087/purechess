name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly
        # `.` context + -c are required: without -c flyctl deploys with the
        # app's existing machine config and the repo fly.toml (http_service,
        # release_command, env) is silently ignored. The dockerfile path in
        # fly.toml resolves relative to the config dir, the context is `.`.
        run: flyctl deploy . -c apps/api/fly.toml --remote-only --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web to Fly
        run: flyctl deploy . -c apps/web/fly.toml --remote-only --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Health check API
        run: |
          STATUS=$(curl -sf https://purechess-api.fly.dev/api/health | jq -r '.status')
          [ "$STATUS" = "ok" ] || (echo "API health failed post-deploy" && exit 1)

      - name: Health check Web
        run: curl -sf https://purechess-web.fly.dev/api/health
