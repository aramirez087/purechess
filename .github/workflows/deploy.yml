name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly
        # `.` context + -c are required: without -c flyctl deploys with the
        # app's existing machine config and the repo fly.toml (http_service,
        # release_command, env) is silently ignored. The dockerfile path in
        # fly.toml resolves relative to the config dir, the context is `.`.
        run: flyctl deploy . -c apps/api/fly.toml --remote-only --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web to Fly
        run: flyctl deploy . -c apps/web/fly.toml --remote-only --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      # Right after a rolling deploy (with auto_stop_machines + 30s check
      # grace) the Fly edge can briefly have no passing machine to route to —
      # a single curl held ~53s and 5xx'd on an app that was healthy seconds
      # later. Retry with backoff and echo the body so a REAL failure is
      # diagnosable from the log.
      - name: Health check API
        run: |
          for i in $(seq 1 10); do
            BODY=$(curl -s --max-time 15 https://purechess-api.fly.dev/api/health || true)
            STATUS=$(echo "$BODY" | jq -r '.status' 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "API healthy on attempt $i: $BODY"
              exit 0
            fi
            echo "Attempt $i/10: API not healthy yet (body: ${BODY:-<no response>}); retrying in 10s"
            sleep 10
          done
          echo "API health failed post-deploy"
          exit 1

      - name: Health check Web
        run: |
          for i in $(seq 1 10); do
            if curl -sf --max-time 15 -o /dev/null https://purechesss.com/api/health; then
              echo "Web healthy on attempt $i"
              exit 0
            fi
            echo "Attempt $i/10: web not healthy yet; retrying in 10s"
            sleep 10
          done
          echo "Web health failed post-deploy"
          exit 1
