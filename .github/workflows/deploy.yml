name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"

jobs:
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run migrations via Fly one-off machine
        run: |
          flyctl machine run \
            registry.fly.io/purechess-api:latest \
            --app purechess-api \
            --env DATABASE_URL="$DATABASE_URL" \
            --env DATABASE_URL_DIRECT="$DATABASE_URL_DIRECT" \
            --restart no \
            --rm \
            -- sh -c "node node_modules/prisma/build/index.js migrate deploy"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly
        run: flyctl deploy --app purechess-api --dockerfile apps/api/Dockerfile --remote-only --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web to Fly
        run: flyctl deploy --app purechess-web --dockerfile apps/web/Dockerfile --remote-only --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Health check API
        run: |
          STATUS=$(curl -sf https://purechess-api.fly.dev/api/health | jq -r '.status')
          [ "$STATUS" = "ok" ] || (echo "API health failed post-deploy" && exit 1)

      - name: Health check Web
        run: curl -sf https://purechess.com/api/health
