name: CI

on:
  pull_request:
    branches: [main, "epic/**"]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @purechess/shared build

      - name: Generate Prisma client
        run: pnpm --filter @purechess/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @purechess/shared build

      - name: Generate Prisma client
        run: pnpm --filter @purechess/api exec prisma generate

      - name: Test
        run: pnpm test

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: purechess-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: purechess-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  engine-shadow:
    name: Engine Shadow Parity
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @purechess/shared build

      - name: Generate Prisma client
        run: pnpm --filter @purechess/api exec prisma generate

      - name: Run shadow parity suite (ts-vs-ts mode)
        run: pnpm engine:shadow
        env:
          ENGINE_BACKEND: ts

  rust-parity:
    name: Rust Parity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/purechess-engine"

      - name: Cargo test (parity + perft)
        run: cargo test --features impl
        working-directory: crates/purechess-engine

      - name: Cargo clippy (deny warnings)
        run: cargo clippy --all-targets --features impl -- -D warnings
        working-directory: crates/purechess-engine

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: postgresql://purechess:purechess@localhost:5432/purechess
      DATABASE_URL_DIRECT: postgresql://purechess:purechess@localhost:5432/purechess
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-session-secret-min-32-chars-for-testing-only
      NEXT_PUBLIC_API_URL: http://localhost:3000
      WEB_URL: http://localhost:3000
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: purechess
          POSTGRES_PASSWORD: purechess
          POSTGRES_DB: purechess
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @purechess/shared build

      - name: Run migrations
        run: pnpm --filter @purechess/api exec prisma migrate deploy

      - name: Build API
        run: pnpm --filter @purechess/api build

      - name: Start API
        run: node apps/api/dist/main.js &
        env:
          PORT: "4000"

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/api/health && break
            sleep 2
          done

      - name: Health check smoke test
        run: |
          STATUS=$(curl -sf http://localhost:4000/api/health | jq -r '.status')
          [ "$STATUS" = "ok" ] || (echo "API health failed: $STATUS" && exit 1)
